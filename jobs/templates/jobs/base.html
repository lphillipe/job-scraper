<!-- jobs/templates/jobs/base.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Job Scraper{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header a {
      text-decoration: none;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 1.1rem;
    }

    header span {
      color: #0a66c2;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 1.5rem;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.95rem;
      padding: 6px 10px;
      background: transparent;
      color: #1a1a1a;
    }

    .search-bar input::placeholder { color: #999; }

    .search-bar button {
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .search-bar button:hover { background: #0958a8; }

    .error {
      background: #fff0f0;
      border: 1px solid #fcc;
      color: #c00;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <header>
    <a href="/">Job<span>Scraper</span></a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
